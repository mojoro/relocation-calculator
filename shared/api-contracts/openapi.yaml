openapi: 3.1.0
info:
  title: Berlin Relocation Calculator API
  version: 1.0.0
  description: API for calculating German net salary and estimating Berlin relocation costs

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://relocation-calculator-production.up.railway.app
    description: Production

security: []

paths:
  /api/v1/salary/calculate:
    post:
      operationId: calculateNetSalary
      summary: Calculate net salary from gross annual salary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalaryRequest"
      responses:
        "200":
          description: Successful salary calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalaryResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/costs/estimate:
    get:
      operationId: estimateCosts
      summary: Estimate living costs for a Berlin neighborhood
      parameters:
        - name: bezirk
          in: query
          required: true
          schema:
            type: string
        - name: rooms
          in: query
          required: false
          schema:
            type: integer
            default: 2
      responses:
        "200":
          description: Successful cost estimation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/costs/allocate:
    post:
      operationId: allocateBudget
      summary: Construct a budget and return Bezirk-specific information on line-items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetAllocationRequest"
      responses:
        "200":
          description: Successful budget allocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetAllocation"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/costs/analyze:
    post:
      operationId: analyzeSelections
      summary: Collects all relevant context about chosen bezirk and budget choices, sends to AI for analysis, and returns a description of life with the user's choices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisContext"
      responses:
        "200":
          description: Successful AI-generated budget analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetAnalysis"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/neighborhoods:
    get:
      operationId: getAllNeighborhoods
      summary: Get all Berlin neighborhood profiles
      responses:
        "200":
          description: List of all neighborhood profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeighborhoodProfile"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/neighborhoods/{bezirk}:
    get:
      operationId: getNeighborhood
      summary: Get a specific Berlin neighborhood profile
      parameters:
        - name: bezirk
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Neighborhood profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeighborhoodProfile"
        "404":
          description: Neighborhood not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    TaxClass:
      type: string
      enum:
        - I
        - II
        - III
        - IV
        - V
        - VI
      description: German tax classes (Steuerklassen I-VI)

    Bezirk:
      type: string
      enum:
        - mitte
        - friedrichshain-kreuzberg
        - pankow
        - charlottenburg-wilmersdorf
        - spandau
        - steglitz-zehlendorf
        - tempelhof-schoeneberg
        - neukoelln
        - treptow-koepenick
        - marzahn-hellersdorf
        - lichtenberg
        - reinickendorf
      x-enum-varnames:
        - MITTE
        - FRIEDRICHSHAIN_KREUZBERG
        - PANKOW
        - CHARLOTTENBURG_WILMERSDORF
        - SPANDAU
        - STEGLITZ_ZEHLENDORF
        - TEMPELHOF_SCHOENEBERG
        - NEUKOELLN
        - TREPTOW_KOEPENICK
        - MARZAHN_HELLERSDORF
        - LICHTENBERG
        - REINICKENDORF
      x-enum-descriptions:
        - Mitte
        - Friedrichshain-Kreuzberg
        - Pankow
        - Charlottenburg-Wilmersdorf
        - Spandau
        - Steglitz-Zehlendorf
        - "Tempelhof-Sch\xF6neberg"
        - "Neuk\xF6lln"
        - "Treptow-K\xF6penick"
        - Marzahn-Hellersdorf
        - Lichtenberg
        - Reinickendorf

    SalaryRequest:
      type: object
      required:
        - grossAnnual
        - taxClass
      properties:
        grossAnnual:
          type: integer
          minimum: 1
          maximum: 10000000
          description: Gross annual salary in EUR
        taxClass:
          $ref: "#/components/schemas/TaxClass"
        churchTax:
          type: boolean
          default: false
        hasChildren:
          type: boolean
          default: false
        childCount:
          type: integer
          minimum: 0
          default: 0
        respondentAge:
          type: integer
          minimum: 18
          maximum: 125
          default: 18

    SalaryResponse:
      type: object
      required:
        - grossMonthly
        - netMonthly
        - incomeTax
        - solidaritySurcharge
        - healthInsurance
        - pensionInsurance
        - unemploymentInsurance
        - nursingCareInsurance
        - churchTaxAmount
        - totalDeductions
        - incomeBreakdown
      properties:
        grossMonthly:
          type: number
          format: double
          description: Monthly amount in EUR
        netMonthly:
          type: number
          format: double
          description: Monthly amount in EUR
        incomeTax:
          type: number
          format: double
          description: Monthly amount in EUR
        solidaritySurcharge:
          type: number
          format: double
          description: Monthly amount in EUR
        healthInsurance:
          type: number
          format: double
          description: Monthly amount in EUR
        pensionInsurance:
          type: number
          format: double
          description: Monthly amount in EUR
        unemploymentInsurance:
          type: number
          format: double
          description: Monthly amount in EUR
        nursingCareInsurance:
          type: number
          format: double
          description: Monthly amount in EUR
        churchTaxAmount:
          type:
            - number
            - "null"
          format: double
          description: Monthly amount in EUR
        totalDeductions:
          type: number
          format: double
          description: Monthly amount in EUR
        incomeBreakdown:
          $ref: "#/components/schemas/IncomeTaxBreakdown"

    IncomeTaxBreakdown:
      type: object
      required:
        - grossAnnual
        - zvE
        - brackets
        - einkommensteuerAnnual
        - einkommensteuerMonthly
        - vorsorgepauschale
        - werbungskosten
        - sonderausgaben
        - lohnsteuerMonthly
      properties:
        grossAnnual:
          type: number
          format: double
          description: Gross annual salary (echoed for display context)
        zvE:
          type: number
          format: double
          description: Zu versteuerndes Einkommen — taxable income after all deductions
        brackets:
          type: array
          description: >
            The five zones of the German progressive tax formula, in fixed order:
            [Grundfreibetrag, Zone 1, Zone 2, Spitzensteuersatz, Reichensteuer].
          minItems: 5
          maxItems: 5
          items:
            $ref: "#/components/schemas/TaxBracket"
        einkommensteuerAnnual:
          type: number
          format: double
          description: Total annual income tax before employee deductions
        einkommensteuerMonthly:
          type: number
          format: double
          description: einkommensteuerAnnual / 12
        vorsorgepauschale:
          type: number
          format: double
          description: Annual provision allowance (reduces taxable income)
        werbungskosten:
          type: number
          format: double
          description: Employee expense lump sum (1.230 EUR for 2026)
        sonderausgaben:
          type: number
          format: double
          description: Special expenses flat deduction (36 EUR for 2026)
        lohnsteuerMonthly:
          type: number
          format: double
          description: Final monthly wage tax after all deductions

    TaxBracket:
      type: object
      required:
        - name
        - lowerBound
        - upperBound
        - rate
        - taxAmount
      properties:
        name:
          type: string
          enum:
            - Grundfreibetrag
            - Zone 1
            - Zone 2
            - Spitzensteuersatz
            - Reichensteuer
          description: Bracket name, one of the five progressive tax zones
        lowerBound:
          type: integer
          description: Inclusive lower bound of the bracket in EUR
          examples: [0]
        upperBound:
          type:
            - integer
            - "null"
          description: Inclusive upper bound in EUR, null for the open-ended top bracket
          examples: [12348]
        rate:
          type: string
          description: >
            Tax rate or rate range for this bracket (e.g. "0%", "14–24%", "42%")
          examples: ["0%"]
        taxAmount:
          type: number
          format: double
          description: Tax owed within this bracket for the given income
          examples: [0.0]

    RentRange:
      type: object
      required:
        - min
        - max
        - median
      properties:
        min:
          type: number
          format: double
        max:
          type: number
          format: double
        median:
          type: number
          format: double

    CostEstimate:
      type: object
      required:
        - bezirk
        - displayName
        - rooms
        - rentRange
        - utilities
        - transport
        - groceries
        - totalEstimated
      properties:
        bezirk:
          $ref: "#/components/schemas/Bezirk"
        displayName:
          type: string
        rooms:
          type: integer
        rentRange:
          $ref: "#/components/schemas/RentRange"
        utilities:
          type: number
          format: double
        transport:
          type: number
          format: double
        groceries:
          type: number
          format: double
        totalEstimated:
          type: number
          format: double

    BudgetAllocationRequest:
      type: object
      required:
        - netMonthlySalary
        - bezirk
        - rooms
        - categories
      properties:
        netMonthlySalary:
          type: number
          format: float
        bezirk:
          $ref: "#/components/schemas/Bezirk"
        rooms:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/BudgetCategoryInput"

    BudgetCategoryInput:
      type: object
      required:
        - key
        - label
        - percentage
        - isCustom
      properties:
        key:
          type: string
        label:
          type: string
        percentage:
          type: number
          format: float
        isCustom:
          type: boolean

    BudgetAllocation:
      type: object
      required:
        - netMonthlySalary
        - bezirk
        - rooms
        - categories
      properties:
        netMonthlySalary:
          type: number
          format: float
        bezirk:
          $ref: "#/components/schemas/Bezirk"
        rooms:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/BudgetCategory"

    BudgetCategory:
      type: object
      required:
        - key
        - label
        - percentage
        - total
        - isCustom
        - pieGroup
      properties:
        key:
          type: string
        label:
          type: string
        percentage:
          type: number
          format: float
        total:
          type: number
          format: float
        isCustom:
          type: boolean
        pieGroup:
          type: string
        recommendedState:
          type:
            - object
            - "null"
          properties:
            minTotal:
              type: number
              format: double
            percentage:
              type: number
              format: float

    AnalysisContext:
      type: object
      required:
        - netMonthlySalary
        - grossAnnualSalary
        - taxClass
        - bezirk
        - rooms
        - categories
        - rentRange
        - neighborhoodVibe
      properties:
        netMonthlySalary:
          type: number
          format: double
          description: Monthly take-home pay after all deductions
        grossAnnualSalary:
          type: integer
          description: Gross annual salary in EUR (for context on career level)
        taxClass:
          $ref: "#/components/schemas/TaxClass"
        bezirk:
          $ref: "#/components/schemas/Bezirk"
        bezirkDisplayName:
          type: string
          description: Human-readable Bezirk name (e.g. "Friedrichshain-Kreuzberg")
        rooms:
          type: integer
          description: Number of rooms in the apartment
        categories:
          type: array
          description: Full budget allocation with percentages and EUR amounts
          items:
            $ref: "#/components/schemas/BudgetCategory"
        totalAllocated:
          type: number
          format: double
          description: Sum of all category EUR amounts
        remainingMonthly:
          type: number
          format: double
          description: Net salary minus total allocated (can be negative)
        rentRange:
          $ref: "#/components/schemas/RentRange"
        neighborhoodVibe:
          type: string
          description: The Bezirk's vibe description from neighborhood profile
        neighborhoodHighlights:
          type: array
          items:
            type: string
          description: Key highlights of the chosen Bezirk
        hasChildren:
          type: boolean
        childCount:
          type: integer

    BudgetAnalysis:
      type: object
      required:
        - sections
        - generatedAt
      properties:
        sections:
          type: array
          description: Structured narrative sections for display
          items:
            $ref: "#/components/schemas/AnalysisSection"
        generatedAt:
          type: string
          format: date-time

    AnalysisSection:
      type: object
      required:
        - key
        - heading
        - body
      properties:
        key:
          type: string
          description: Section identifier for styling/icons
          enum:
            - daily-life
            - housing
            - food-and-dining
            - transport-and-mobility
            - leisure-and-culture
            - financial-health
            - tips
        heading:
          type: string
          description: Display heading for the section
        body:
          type: string
          description: Markdown-formatted narrative content
        sentiment:
          type: string
          enum:
            - positive
            - neutral
            - caution
          description: Overall tone of this section, for visual treatment

    NeighborhoodProfile:
      type: object
      required:
        - bezirk
        - displayName
        - vibe
        - commuteMinutes
        - highlights
      properties:
        bezirk:
          $ref: "#/components/schemas/Bezirk"
        displayName:
          type: string
        vibe:
          type: string
        commuteMinutes:
          type: integer
        highlights:
          type: array
          items:
            type: string

    ApiError:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
        message:
          type: string
        timestamp:
          type: string
          format: date-time
