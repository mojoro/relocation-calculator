<div class="space-y-6">
  <!-- Selection Card -->
  <div
    class="rounded-lg border p-6 bg-[--reloc-ref-color-bg-card] border-[--reloc-ref-color-border] [box-shadow:var(--reloc-ref-shadow-card)]"
  >
    <h2
      class="mb-1 text-2xl font-semibold text-[--reloc-ref-color-text-primary] [font-family:var(--reloc-ref-font-display)]"
    >
      Cost Estimator
    </h2>
    <p class="mb-6 text-sm text-[--reloc-ref-color-text-secondary]">
      Select a Berlin district and apartment size to see estimated monthly living costs.
    </p>

    <form [formGroup]="form" class="space-y-5">
      <!-- Bezirk Selection -->
      <div>
        <label
          for="bezirk"
          class="mb-1.5 block text-sm font-medium text-[--reloc-ref-color-text-primary]"
        >
          District (Bezirk)
        </label>
        <select
          id="bezirk"
          formControlName="bezirk"
          class="w-full rounded-md border px-3 py-2.5 text-sm outline-none border-[--reloc-ref-color-border] bg-[--reloc-ref-color-bg-card] text-[--reloc-ref-color-text-primary]"
        >
          @for (option of bezirkOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        </select>
      </div>

      <!-- Room Count -->
      <div>
        <label
          class="mb-2 block text-sm font-medium text-[--reloc-ref-color-text-primary]"
        >
          Number of Rooms
        </label>
        <div class="flex gap-2">
          @for (room of roomOptions; track room) {
            <label
              class="flex h-10 w-14 cursor-pointer items-center justify-center rounded-md border text-sm font-medium transition-colors"
              [ngClass]="{
                'border-[--reloc-ref-color-primary] bg-[--reloc-ref-color-primary-light] text-[--reloc-ref-color-primary]': form.controls.rooms.value === room,
                'border-[--reloc-ref-color-border] bg-[--reloc-ref-color-bg-card] text-[--reloc-ref-color-text-primary]': form.controls.rooms.value !== room
              }"
            >
              <input type="radio" formControlName="rooms" [value]="room" class="sr-only" />
              {{ room }}
            </label>
          }
        </div>
      </div>
    </form>
  </div>

  <!-- Loading -->
  @if (isLoading()) {
    <div
      class="flex items-center justify-center rounded-lg border p-8 border-[--reloc-ref-color-border] bg-[--reloc-ref-color-bg-card]"
    >
      <div
        class="h-5 w-5 animate-spin rounded-full border-2 border-[--reloc-ref-color-primary] border-t-transparent"
      ></div>
      <span class="ml-3 text-sm text-[--reloc-ref-color-text-secondary]"
        >Estimating costs...</span
      >
    </div>
  }

  <!-- Error -->
  @if (error(); as err) {
    <div
      class="rounded-lg border p-4 border-[--reloc-ref-color-error] bg-[#fef2f2]"
    >
      <p class="text-sm font-medium text-[--reloc-ref-color-error]">
        {{ err.message }}
      </p>
    </div>
  }

  <!-- Results -->
  @if (result(); as estimate) {
    @if (!isLoading()) {
      <reloc-cost-breakdown
        [estimate]="estimate"
        [netMonthlySalary]="netMonthlySalary()"
        [affordabilityRatio]="affordabilityRatio()"
        [affordabilityLabel]="affordabilityLabel()"
      />
    }
  }
</div>
