<div class="flex items-stretch gap-3">
  <!-- Color accent bar -->
  <div class="w-[3px] shrink-0 rounded-full" [style.background-color]="color()"></div>

  <!-- Main content -->
  <div class="flex-1 min-w-0">
    <!-- Top row: label + percentage pill + EUR amount -->
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm font-medium text-(--reloc-ref-color-text-primary)">
        {{ label() }}
      </span>
      <div class="flex items-center gap-2">
        <span
          class="inline-flex min-w-[3rem] items-center justify-center rounded-full px-2 py-0.5 text-xs font-semibold tabular-nums text-white"
          [style.background-color]="color()"
        >
          {{ percentage() }}%
        </span>
        <span class="text-sm tabular-nums text-(--reloc-ref-color-text-secondary) w-[5.5rem] text-right">
          {{ amount() | currency: 'EUR' : 'symbol' : '1.0-0' : 'de' }}
        </span>
      </div>
    </div>

    <!-- Slider with colored fill -->
    <div class="relative h-2 w-full rounded-full bg-(--reloc-ref-color-border)">
      <!-- Fill track -->
      <div
        class="absolute inset-y-0 left-0 rounded-full transition-[width] duration-150"
        [style.width.%]="fillPercent()"
        [style.background-color]="color()"
      ></div>
      <!-- Native range input (transparent track, visible thumb) -->
      <input
        type="range"
        [min]="0"
        [max]="50"
        [step]="1"
        [value]="percentage()"
        (input)="onSliderChange($event)"
        [style.color]="color()"
        class="absolute inset-0 w-full h-full cursor-pointer appearance-none bg-transparent [&::-webkit-slider-thumb]:h-4 [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-current [&::-webkit-slider-thumb]:shadow-sm [&::-moz-range-thumb]:h-4 [&::-moz-range-thumb]:w-4 [&::-moz-range-thumb]:rounded-full [&::-moz-range-thumb]:border-0 [&::-moz-range-thumb]:bg-current [&::-moz-range-track]:bg-transparent [&::-webkit-slider-runnable-track]:bg-transparent"
      />
    </div>

    <!-- Tick labels -->
    <div class="flex justify-between px-0.5 mt-1">
      <span class="text-[10px] tabular-nums text-(--reloc-ref-color-text-muted)">0</span>
      <span class="text-[10px] tabular-nums text-(--reloc-ref-color-text-muted)">10</span>
      <span class="text-[10px] tabular-nums text-(--reloc-ref-color-text-muted)">20</span>
      <span class="text-[10px] tabular-nums text-(--reloc-ref-color-text-muted)">30</span>
      <span class="text-[10px] tabular-nums text-(--reloc-ref-color-text-muted)">40</span>
      <span class="text-[10px] tabular-nums text-(--reloc-ref-color-text-muted)">50</span>
    </div>

    <!-- Recommended hint (show when difference > 5%) -->
    @if (showRecommendedHint()) {
      <p class="mt-1 text-xs text-(--reloc-ref-color-text-muted)">
        Recommended: {{ recommendedPercentage() }}%
      </p>
    }
  </div>
</div>
